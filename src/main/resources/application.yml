spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/coupons
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true
logging:
  level:
    root: INFO
    com.pusio.discout.sercice: DEBUG
server:
  port: 8080
