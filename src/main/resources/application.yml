spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/coupons
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: always
logging:
  level:
    root: INFO
    com.pusio.discout.sercice: DEBUG
server:
  port: 8080
